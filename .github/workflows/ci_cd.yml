name: Flutter CI/CD + Vercel Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Download Isar Binary (Linux)
        run: |
          curl -L https://github.com/isar/isar/releases/download/3.1.0%2B1/libisar_linux_x64.so -o libisar.so

      - name: Run Linter (Analyze)
        run: flutter analyze

      - name: Run Tests
        run: flutter test --dart-define=INTEGRATION_TEST=true

  deploy_to_vercel:
    needs: analyze_and_test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_WORDPRESS_PUBLIC_SITE_URL: ${{ secrets.VITE_WORDPRESS_PUBLIC_SITE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate deploy secrets and create Flutter build config
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          secrets = {
              'VITE_SUPABASE_URL': os.environ.get('VITE_SUPABASE_URL', ''),
              'VITE_SUPABASE_PUBLISHABLE_KEY': os.environ.get('VITE_SUPABASE_PUBLISHABLE_KEY', ''),
              'VITE_FIREBASE_API_KEY': os.environ.get('VITE_FIREBASE_API_KEY', ''),
              'VITE_FIREBASE_AUTH_DOMAIN': os.environ.get('VITE_FIREBASE_AUTH_DOMAIN', ''),
              'VITE_FIREBASE_PROJECT_ID': os.environ.get('VITE_FIREBASE_PROJECT_ID', ''),
              'VITE_FIREBASE_STORAGE_BUCKET': os.environ.get('VITE_FIREBASE_STORAGE_BUCKET', ''),
              'VITE_FIREBASE_MESSAGING_SENDER_ID': os.environ.get('VITE_FIREBASE_MESSAGING_SENDER_ID', ''),
              'VITE_FIREBASE_APP_ID': os.environ.get('VITE_FIREBASE_APP_ID', ''),
              'VITE_FIREBASE_MEASUREMENT_ID': os.environ.get('VITE_FIREBASE_MEASUREMENT_ID', ''),
              'VITE_WORDPRESS_PUBLIC_SITE_URL': os.environ.get('VITE_WORDPRESS_PUBLIC_SITE_URL', ''),
          }
          missing = [key for key, value in secrets.items() if not value]
          if missing:
              raise SystemExit(f'Missing required Flutter build secrets: {", ".join(missing)}')
          Path('.ci').mkdir(exist_ok=True)
          Path('.ci/flutter-secrets.json').write_text(json.dumps(secrets), encoding='utf-8')
          PY

      - name: Build Flutter Web
        run: flutter build web --release --dart-define-from-file=.ci/flutter-secrets.json

      - name: Patch Isar web build
        run: dart run tool/patch_isar_web.dart

      - name: Prepare static Vercel bundle
        run: cp vercel.json build/web/vercel.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Skipping Vercel deploy because required VERCEL_* secrets are not configured."
            exit 0
          fi

          cd build/web && vercel --prod --yes --token="$VERCEL_TOKEN"
